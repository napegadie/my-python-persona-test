name: SRE Checks

on:
  push:
    branches:
      - main
      - test-copilot-review
  pull_request:
    branches:
      - main

jobs:
  sre-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check Python version
        run: python --version

      - name: Verify calculator syntax
        run: python -m py_compile calculator.py

      - name: Run unit tests
        run: python -m unittest test_calculator.py