name: PR Persona Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-persona-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  qa-review:
    name: qa-review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build QA comment
        shell: bash
        run: |
          set -euxo pipefail

          {
            echo "## ✅ QA Persona Review"
            echo
            echo "**Focus:** Tests, edge cases, correctness"
            echo
            if [ -f ".github/personas/qa.md" ]; then
              cat .github/personas/qa.md
            else
              echo "_qa.md not found_"
            fi
            echo
            echo "_Mock review generated for PR testing._"
          } > qa_comment.md

          echo "----- qa_comment.md -----"
          cat qa_comment.md

      - name: Post QA comment to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('qa_comment.md', 'utf8');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Upload QA comment artifact
        uses: actions/upload-artifact@v4
        with:
          name: qa-comment
          path: qa_comment.md

